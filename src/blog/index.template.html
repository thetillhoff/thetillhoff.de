{{ template "partials/page.partial.html" . -}}

{{- define "head" -}}
<title>thetillhoff.de</title>
<meta name="description" content="Hey there! 👋 I'm Till. This is my website.">
{{- end }}

{{- define "content" -}}

<div class="vertical textContainer">
  <h1>Blog</h1>
  <p>
    Inspiration, thoughts, ideas, and more.
  </p>
  <ul>
    {{ range sortBy "date" .childMeta }}
    <li>
      <a href="{{ .key }}/">{{ .value.date }} - {{ .value.title }}</a>
    </li>
    {{ end }}
  </ul>
</div>

{{- end }}
